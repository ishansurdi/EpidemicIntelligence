services:
  - type: web
    name: episentinel-api
    env: python
    region: oregon
    plan: free
    buildCommand: >-
      pip install torch==2.6.0 torchdiffeq==0.2.3 --index-url https://download.pytorch.org/whl/cpu &&
      pip install torch_geometric==2.6.1 &&
      pip install torch-scatter torch-sparse torch-cluster torch-spline-conv -f https://data.pyg.org/whl/torch-2.6.0+cpu.html &&
      pip install fastapi==0.115.8 "uvicorn[standard]==0.34.0" pydantic==2.11.1 pandas==2.2.3 numpy==2.2.4 python-dateutil==2.9.0.post0 scikit-learn==1.3.2
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONPATH
        value: /opt/render/project/src
      - key: PYTHON_VERSION
        value: "3.11.9"
